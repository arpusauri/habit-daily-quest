name: Check Server (Backend CI)

on:
  push:
    branches: [ "main" ]
    paths:
      - 'server/**'

jobs:
  test-server:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' 

      - name: Install Dependencies
        run: |
          cd server
          npm install
          
      # Kalau kamu punya test (npm test), taruh di sini. Kalau belum, biarkan saja.
      # Step ini memastikan tidak ada error saat "npm install" sebelum Bonto memprosesnya.